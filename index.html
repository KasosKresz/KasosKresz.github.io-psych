<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Choose English or Magyar for Krisztian Kasos online mental health consultation." />
  <title>Krisztian Kasos | English / Magyar</title>
  <link rel="canonical" href="https://krisztiankasos.mindease.ca/" />
  <link rel="alternate" hreflang="en" href="https://krisztiankasos.mindease.ca/en/" />
  <link rel="alternate" hreflang="hu" href="https://krisztiankasos.mindease.ca/hu/" />
  <link rel="alternate" hreflang="x-default" href="https://krisztiankasos.mindease.ca/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Krisztian Kasos | English / Magyar" />
  <meta property="og:description" content="Choose English or Magyar for Krisztian Kasos online mental health consultation." />
  <meta property="og:url" content="https://krisztiankasos.mindease.ca/" />
  <meta property="og:image" content="https://krisztiankasos.mindease.ca/hero-photo.jpg" />
  <style>
    :root {
      --cream: #faf7f2;
      --cream-md: #f0ead9;
      --tan: #d4c9b5;
      --gold: #c9a86c;
      --brown: #7c6a4a;
      --dark: #2a2118;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, var(--cream) 0%, var(--cream-md) 100%);
      color: var(--dark);
      font-family: Georgia, serif;
      padding: 2rem;
    }
    main {
      max-width: 720px;
      width: 100%;
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--tan);
      padding: 3rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 1rem;
      font-size: 2.6rem;
      font-weight: 400;
      line-height: 1.1;
    }
    p {
      margin: 0 0 2rem;
      font-family: system-ui, sans-serif;
      color: #5d503d;
      line-height: 1.7;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 0.95rem 1.6rem;
      border: 1px solid var(--brown);
      color: var(--dark);
      text-decoration: none;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
      background: #fff;
    }
    .btn.primary {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }
  </style>
</head>
<body>
  <main>
    <h1>Krisztian Kasos</h1>
    <p>Please choose your language to continue.</p>
    <div class="actions">
      <a class="btn primary" href="en/">English</a>
      <a class="btn" href="hu/">Magyar</a>
    </div>
  </main>
</body>
</html>
